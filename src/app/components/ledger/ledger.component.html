<div class="max-w-7xl mx-auto flex flex-col gap-6">

  <!-- Header -->
  <div class="flex justify-between items-center pb-4 border-b border-gray-200">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Transaction Ledger</h1>
      <p class="text-gray-500 text-sm mt-1">Full history of your income and expenses.</p>
    </div>
  </div>
   
 <div class="relative w-full sm:w-80 group">
    <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors">search</mat-icon>
    
    <input 
      type="text" 
      placeholder="Search description or category..." 
      [value]="searchQuery"
      (input)="onSearch($event)"
      class="w-full h-10 pl-10 pr-10 bg-gray-50 border border-gray-200 rounded-full text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 focus:bg-white transition-all shadow-sm"
    >

    <button 
      *ngIf="searchQuery" 
      class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 w-6 h-6 flex items-center justify-center rounded-full hover:bg-gray-200 transition-colors"
      (click)="searchQuery=''; onSearch({target: {value: ''}})"
    >
      <mat-icon class="scale-75">close</mat-icon>
    </button>
  </div>

  <mat-card class="rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    
    <!-- Loading Overlay -->
    <div *ngIf="isLoading" class="absolute inset-0 bg-white/50 z-10 flex justify-center items-center">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div class="overflow-x-auto">
      <table mat-table [dataSource]="transactions" class="w-full text-left">

        <!-- Date Column -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-50 text-gray-700 font-semibold uppercase text-xs px-6 py-4"> Date </th>
          <td mat-cell *matCellDef="let tx" class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium"> {{tx.date}} </td>
        </ng-container>

        <!-- Description Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-50 text-gray-700 font-semibold uppercase text-xs px-6 py-4"> Description </th>
          <td mat-cell *matCellDef="let tx" class="px-6 py-4 text-sm text-gray-700"> {{tx.description}} </td>
        </ng-container>

        <!-- Category Column -->
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-50 text-gray-700 font-semibold uppercase text-xs px-6 py-4"> Category </th>
          <td mat-cell *matCellDef="let tx" class="px-6 py-4"> 
            <span class="px-3 py-1 rounded-full text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-100">
              {{tx.category}}
            </span>
          </td>
        </ng-container>

        <!-- Amount Column -->
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-50 text-gray-700 font-semibold uppercase text-xs px-6 py-4 text-right"> Amount </th>
          <td mat-cell *matCellDef="let tx" class="px-6 py-4 text-right font-semibold whitespace-nowrap text-sm"
              [ngClass]="{'text-red-600': tx.transactionType == 'debited', 'text-green-600': tx.transactionType == 'credited'}">
            {{ tx.transactionType == 'credited' ? '+' : '-' }}{{ tx.amount | currency:'INR' }}
          </td>
        </ng-container>

        <!-- Actions Column (Edit/Delete) -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-50 px-6 py-4 text-right">Actions</th>
          <td mat-cell *matCellDef="let tx" class="px-6 py-4 text-right whitespace-nowrap">
            <!-- Edit Button -->
            <button mat-icon-button color="primary" (click)="editTransaction(tx)" matTooltip="Edit">
              <mat-icon class="text-indigo-500 scale-90">edit</mat-icon>
            </button>
            <!-- Delete Button -->
            <button mat-icon-button color="warn" (click)="deleteTransaction(tx.id)" matTooltip="Delete">
              <mat-icon class="text-red-500 scale-90">delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- Table Rows -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="border-b border-gray-100 hover:bg-gray-50 transition-colors"></tr>

        <!-- Empty State -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell px-6 py-8 text-center text-gray-500" colspan="5">No transactions found.</td>
        </tr>
      </table>
    </div>

    <!-- The Server-Side Paginator -->
    <mat-paginator 
      class="border-t border-gray-100 bg-white"
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 25, 50]"
      (page)="onPageChange($event)"
      aria-label="Select page">
    </mat-paginator>

  </mat-card>
</div>
