<div class="p-6">
  <h2 class="text-xl font-bold text-gray-900 mb-4">{{isEditMode ? 'Edit Transaction' : 'Add Manual Transaction'}}</h2>
  
  <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm border-l-4 border-red-500">
    {{ errorMessage }}
  </div>

  <form [formGroup]="transactionForm" class="flex flex-col gap-4">
    
    <!-- Transaction Type (Income vs Expense) -->
    <mat-button-toggle-group formControlName="type" class="w-full" aria-label="Transaction Type">
      <mat-button-toggle value="debited" class="w-1/2 font-medium">Expense</mat-button-toggle>
      <mat-button-toggle value="credited" class="w-1/2 font-medium">Income</mat-button-toggle>
    </mat-button-toggle-group>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
      <!-- Amount -->
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Amount</mat-label>
        <span matTextPrefix class="mr-1">₹</span>
        <input matInput type="number" formControlName="amount" placeholder="0.00" step="0.01">
      </mat-form-field>

      <!-- Date Picker -->
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="date">
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- Description -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Description</mat-label>
      <input matInput formControlName="description" placeholder="e.g., Starbucks, Target, Salary">
    </mat-form-field>

    <!-- Category -->
    <mat-form-field appearance="outline" class="w-full hide-subscript">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        <mat-option *ngFor="let cat of availableCategories" [value]="cat">
          {{ cat }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </form>

  <!-- Action Buttons -->
  <div class="mt-8 flex justify-end gap-3">
    <button mat-button (click)="onCancel()" class="text-gray-600" [disabled]="isLoading">Cancel</button>
    <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="transactionForm.invalid || isLoading" class="px-6 rounded-lg shadow-sm">
      <span *ngIf="!isLoading">{{ isEditMode ? 'Update' : 'Save' }}</span>
      <mat-spinner *ngIf="isLoading" diameter="20" color="accent"></mat-spinner>
    </button>
  </div>
</div>
