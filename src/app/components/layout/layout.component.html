<div class="min-h-screen bg-gray-50 flex flex-col">

  <mat-toolbar class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50 h-16 px-4 md:px-8 flex justify-between items-center">
    
    <div class="flex items-center gap-4">
      <button mat-icon-button (click)="toggleMobileMenu()" class="md:hidden text-gray-600">
        <mat-icon>menu</mat-icon>
      </button>
       
      
      <div class="flex items-center gap-2 cursor-pointer" routerLink="/dashboard">
        <img src="finsight-logo.png" alt="FinSight AI Logo" class="h-14 w-auto rounded-md shadow-sm">
        <!-- <span class="text-xl font-bold tracking-tight text-gray-900">FinSight AI</span> -->
      </div>
    </div>

    <div class="hidden md:flex items-center gap-6">
      <a routerLink="/dashboard" routerLinkActive="text-indigo-600 font-semibold" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition-colors">Dashboard</a>
      <a routerLink="/upload" routerLinkActive="text-indigo-600 font-semibold" class="text-sm font-medium text-gray-600 hover:text-indigo-600 transition-colors">Upload Statement</a>
      
      <div class="h-6 w-px bg-gray-300"></div>
      
      <button mat-button color="warn" (click)="logout()" class="text-sm">
        <mat-icon class="mr-1">logout</mat-icon> Logout
      </button>
    </div>
  </mat-toolbar>

  <div *ngIf="isMobileMenuOpen" class="md:hidden bg-white border-b border-gray-200 shadow-md absolute w-full z-40 top-16">
    <div class="flex flex-col py-2">
      <a routerLink="/dashboard" (click)="toggleMobileMenu()" class="px-6 py-3 text-gray-700 hover:bg-gray-50 active:bg-indigo-50 active:text-indigo-600 font-medium border-l-4 border-transparent hover:border-indigo-600">Dashboard</a>
      <a routerLink="/upload" (click)="toggleMobileMenu()" class="px-6 py-3 text-gray-700 hover:bg-gray-50 active:bg-indigo-50 active:text-indigo-600 font-medium border-l-4 border-transparent hover:border-indigo-600">Upload Statement</a>
      <div class="border-t border-gray-100 my-1"></div>
      <button (click)="logout()" class="px-6 py-3 text-left text-red-600 font-medium hover:bg-red-50 w-full">Logout</button>
    </div>
  </div>

  <main class="flex-grow w-full max-w-7xl mx-auto p-4 md:p-8 mt-4">
    <router-outlet></router-outlet>
  </main>

</div>
